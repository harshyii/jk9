<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>Search | Haryana Tools</title>

<meta
    name="description"
    content="Search power tools, hand tools, industrial equipment, brands and buying guides at Haryana Tools.">

<meta
    name="robots"
    content="index,follow">

<link
    rel="canonical"
    href="https://haryana.tools/search.html">

<link
    rel="icon"
    href="assets/favicon.ico">

<link
    rel="manifest"
    href="manifest.json">

<link
    rel="stylesheet"
    href="assets/bootstrap.min.css">

<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link
    rel="stylesheet"
    href="assets/style.css">

<meta
    property="og:type"
    content="website">

<meta
    property="og:title"
    content="Search | Haryana Tools">

<meta
    property="og:description"
    content="Search products and blogs from Haryana Tools.">

<meta
    property="og:url"
    content="https://haryana.tools/search.html">

<meta
    property="og:image"
    content="https://haryana.tools/assets/logo.png">

<meta
    name="twitter:card"
    content="summary_large_image">

<meta
    name="twitter:title"
    content="Search | Haryana Tools">

<meta
    name="twitter:description"
    content="Search products and blogs from Haryana Tools.">

<meta
    name="twitter:image"
    content="https://haryana.tools/assets/logo.png">

<script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"WebSite",
  "name":"Haryana Tools",
  "url":"https://haryana.tools/",
  "potentialAction":{
    "@type":"SearchAction",
    "target":"https://haryana.tools/search.html?q={search_term_string}",
    "query-input":"required name=search_term_string"
  }
}
</script>

</head>

<body>

<div id="app-root"></div>

<script
    src="assets/bootstrap.bundle.min.js"
    defer></script>

<script
    src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"
    defer></script>

<script
    type="module"
    src="app.js"></script>

</body>

</html>
